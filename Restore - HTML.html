/* ── MINI CALENDAR ── */
function MiniCal({sel,onSel}) {
  const [vm,setVm] = useState(new Date());
  const today = new Date(); today.setHours(0,0,0,0);
  const y=vm.getFullYear(),m=vm.getMonth();
  const fd=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate();
  const mn=vm.toLocaleDateString('en-CA',{month:'long',year:'numeric'});
  const cells=[];
  for(let i=0;i<fd;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(new Date(y,m,d));
  return (
    <div>
      <div className="chdr">
        <button className="cnav" onClick={()=>setVm(new Date(y,m-1,1))}>‹</button>
        <strong style={{fontSize:14}}>{mn}</strong>
        <button className="cnav" onClick={()=>setVm(new Date(y,m+1,1))}>›</button>
      </div>
      <div className="cwds">{['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=><div className="cwd" key={d}>{d}</div>)}</div>
      <div className="cgr">
        {cells.map((d,i)=>{
          if(!d) return <div key={i}/>;
          const past=d<today,isSel=sel&&d.toDateString()===sel.toDateString(),isT=d.toDateString()===today.toDateString();
          return <div key={i} className={`cday${isSel?' sel':''}${isT?' tod':''}${past?' past':''}`} onClick={()=>!past&&onSel(d)}>{d.getDate()}</div>;
        })}
      </div>
    </div>
  );
}

/* ── CHATBOT ── */
function Chatbot({onNav}) {
  const [open,setOpen]=useState(false);
  const [msgs,setMsgs]=useState([{r:'bot',t:"👋 Hi! I'm the Re'Store virtual assistant. How can I help you today?",a:null}]);
  const [inp,setInp]=useState('');
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

  const KB=[
    {kw:['price','cost','how much','quote','estimate'],t:"Our pricing starts at $80 for a basic clean. Use our Quote Calculator for an exact estimate!",a:'quote'},
    {kw:['book','appointment','schedule','reserve'],t:"Great! I can help you book. We have availability this week. Want to see our calendar?",a:'services'},
    {kw:['carpet'],t:"Carpet cleaning starts at $60 + $0.18/sq ft. We use hot water extraction. Want a quote?",a:'quote'},
    {kw:['hour','open','available','when'],t:"We're available Monday–Saturday, 8am–6pm. Sundays by appointment only."},
    {kw:['area','location','serve','calgary','airdrie'],t:"We serve Calgary, Airdrie, Cochrane, Chestermere, and Okotoks!"},
    {kw:['cancel','reschedule'],t:"Please call 403-383-3707 or use 'My Bookings' to reschedule at least 24hrs before."},
    {kw:['gift','card','present'],t:"Gift cards from $50–$250 – delivered instantly by email!",a:'giftcard'},
    {kw:['eco','green','safe','pet','child','toxic'],t:"Yes! We use 100% eco-friendly, non-toxic products safe for kids, pets, and allergy sufferers 🌿"},
    {kw:['commercial','office','business'],t:"We offer commercial cleaning for offices, retail, restaurants & more!",a:'commercial'},
    {kw:['move','moving out'],t:"Move-in/out cleaning starts at $220. Perfect for getting deposits back!",a:'services'},
  ];

  const reply=(msg)=>{
    const m=msg.toLowerCase();
    return KB.find(k=>k.kw.some(w=>m.includes(w)))||{t:"Thanks for reaching out! I can help with pricing, booking, service areas and more. What would you like to know?"};
  };

  const send=(text)=>{
    if(!text.trim()) return;
    setMsgs(ms=>[...ms,{r:'user',t:text.trim(),a:null}]);
    setInp('');
    setLoading(true);
    setTimeout(()=>{
      const r=reply(text);
      setMsgs(ms=>[...ms,{r:'bot',t:r.t,a:r.a||null}]);
      setLoading(false);
    },600);
  };

  return (
    <>
      {open && (
        <div className="cwin">
          <div className="cwhdr">
            <div className="cav">🧹</div>
            <div><div style={{fontWeight:700,fontSize:14}}>Re'Store Assistant</div><div style={{fontSize:11,opacity:.8}}>● Online – replies instantly</div></div>
            <button style={{marginLeft:'auto',background:'none',border:'none',color:'#fff',fontSize:20,cursor:'pointer',lineHeight:1}} onClick={()=>setOpen(false)}>×</button>
          </div>
          <div className="cmsgs">
            {msgs.map((m,i)=>(
              <div key={i} className={`cm ${m.r}`}>
                {m.t}
                {m.a&&<div><button className="cact" onClick={()=>{onNav(m.a);setOpen(false);}}>→ {m.a==='quote'?'Get a Quote':m.a==='giftcard'?'Buy Gift Card':'Book Now'}</button></div>}
              </div>
            ))}
            {loading&&<div className="cm bot" style={{color:'var(--gr)'}}>Typing…</div>}
            <div ref={endRef}/>
          </div>
          <div className="cinr">
            <input className="cin" placeholder="Ask a question…" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send(inp)}/>
            <button className="csnd" onClick={()=>send(inp)}>➤</button>
          </div>
        </div>
      )}
      <button className="cfab" onClick={()=>setOpen(o=>!o)}>{open?'×':'💬'}</button>
    </>
  );
}

/* ── QUOTE CALCULATOR ── */
function QuoteCalc({onBook}) {
  const [svc,setSvc]=useState('residential');
  const [beds,setBeds]=useState(2);
  const [baths,setBaths]=useState(1);
  const [sqft,setSqft]=useState(1200);
  const [freq,setFreq]=useState('once');
  const [extras,setExtras]=useState([]);
  const [q,setQ]=useState(null);
  const EX=[{id:'windows',l:'🪟 Windows',p:40},{id:'fridge',l:'🧊 Fridge',p:30},{id:'oven',l:'🔥 Oven',p:25},{id:'laundry',l:'👕 Laundry',p:20},{id:'garage',l:'🚗 Garage',p:50},{id:'patio',l:'🌿 Patio',p:35}];
  const tog=id=>setExtras(e=>e.includes(id)?e.filter(x=>x!==id):[...e,id]);
  const calc=()=>{
    let b=0;
    if(svc==='residential') b=80+(beds*25)+(baths*20);
    else if(svc==='deep') b=150+(beds*35)+(baths*30);
    else if(svc==='carpet') b=60+(sqft*.18);
    else b=120+(sqft*.12);
    const disc={weekly:.20,biweekly:.10,monthly:.05,once:0}[freq]||0;
    const ea=extras.reduce((a,id)=>a+(EX.find(e=>e.id===id)?.p||0),0);
    const sub=b+ea,dAmt=sub*disc,after=sub-dAmt,gst=after*.05;
    setQ({sub:sub.toFixed(2),d:dAmt.toFixed(2),dp:(disc*100).toFixed(0),gst:gst.toFixed(2),tot:(after+gst).toFixed(2)});
  };
  return (
    <div className="qc">
      <h2>Instant Quote Calculator</h2>
      <p className="fsub" style={{marginBottom:20}}>Get an estimate for your cleaning service in seconds.</p>
      <div className="stabs">
        {[{id:'residential',l:'🏠 Residential'},{id:'deep',l:'🧹 Deep Clean'},{id:'carpet',l:'🟫 Carpet'},{id:'commercial',l:'🏢 Commercial'}].map(s=>(
          <button key={s.id} className={`stab${svc===s.id?' on':''}`} onClick={()=>{setSvc(s.id);setQ(null)}}>{s.l}</button>
        ))}
      </div>
      {(svc==='residential'||svc==='deep')&&(
        <div className="fr" style={{marginBottom:16}}>
          <div className="fg"><label>Bedrooms: {beds}</label><input type="range" min={1} max={6} value={beds} onChange={e=>{setBeds(+e.target.value);setQ(null)}} className="rng"/></div>
          <div className="fg"><label>Bathrooms: {baths}</label><input type="range" min={1} max={5} value={baths} onChange={e=>{setBaths(+e.target.value);setQ(null)}} className="rng"/></div>
        </div>
      )}
      {(svc==='carpet'||svc==='commercial')&&(
        <div className="fg" style={{marginBottom:16}}><label>Square Footage: {sqft} sq ft</label><input type="range" min={200} max={5000} step={50} value={sqft} onChange={e=>{setSqft(+e.target.value);setQ(null)}} className="rng"/></div>
      )}
      <div className="fg" style={{marginBottom:16}}>
        <label>Frequency</label>
        <select value={freq} onChange={e=>{setFreq(e.target.value);setQ(null)}}>
          <option value="once">One-time</option>
          <option value="weekly">Weekly (20% off)</option>
          <option value="biweekly">Bi-weekly (10% off)</option>
          <option value="monthly">Monthly (5% off)</option>
        </select>
      </div>
      <div className="fg" style={{marginBottom:20}}>
        <label>Add-ons</label>
        <div className="exg">
          {EX.map(e=><div key={e.id} className={`ex${extras.includes(e.id)?' on':''}`} onClick={()=>tog(e.id)}>{e.l}<span style={{marginLeft:'auto',opacity:.7,fontSize:12}}>+${e.p}</span></div>)}
        </div>
      </div>
      <button className="rbtn" onClick={calc}>Get My Quote</button>
      {q&&(
        <div className="qres">
          <h3>Your Estimate</h3>
          <div className="ql2"><span>Subtotal</span><span>${q.sub}</span></div>
          {parseFloat(q.d)>0&&<div className="ql2"><span>Discount ({q.dp}%)</span><span>−${q.d}</span></div>}
          <div className="ql2"><span>GST (5%)</span><span>${q.gst}</span></div>
          <div className="qtot"><span>Total (CAD)</span><span>${q.tot}</span></div>
          <button className="wbtn" onClick={onBook}>Book This Service →</button>
        </div>
      )}
    </div>
  );
}

          <div style={{textAlign:'center',marginTop:44}}>
            <button className="rmbtn" onClick={()=>nav(P.services)}>Book Your Cleaning Today</button>
          </div>
        </div>}

        {/* GALLERY */}
        {page===P.gallery&&<div className="sec">
          <div style={{textAlign:'center',marginBottom:48}}>
            <div className="gbar" style={{margin:'0 auto 16px'}}/>
            <h2 className="stitle">Gallery</h2>
            <p className="ssub" style={{margin:'0 auto'}}>A look at the spaces we've transformed for our clients across Calgary and area.</p>
          </div>
          <div className="gg">
            {[RES,COM,SPC,RES,COM,SPC].map((src,i)=><div className="gi" key={i}><img src={src} alt={`Gallery ${i+1}`}/></div>)}

        </div>}

        {/* GIFT CARD */}
        {page===P.giftcard&&<div className="sec" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh'}}>
          <div className="gcb">
            <div style={{fontSize:52,marginBottom:18}}>🎁</div>
            <h2 style={{fontFamily:'Cormorant Garamond,serif',fontSize:'2rem',color:'var(--red)',marginBottom:8}}>Gift a Clean Home</h2>
            <p style={{color:'var(--gr)',fontSize:14.5,marginBottom:24}}>Give the gift of a spotless space. Delivered instantly by email after purchase.</p>

              <input className="gin" placeholder="Recipient Name" value={gf.rName} onChange={e=>setGf(f=>({...f,rName:e.target.value}))}/>
              <input className="gin" type="email" placeholder="Recipient Email *" value={gf.rEmail} onChange={e=>setGf(f=>({...f,rEmail:e.target.value}))}/>
              <input className="gin" placeholder="Your Name (sender)" value={gf.sName} onChange={e=>setGf(f=>({...f,sName:e.target.value}))}/>
              <input className="gin" placeholder="Personal message (optional)" value={gf.msg} onChange={e=>setGf(f=>({...f,msg:e.target.value}))}/>
              <select className="gin" value={gf.amount} onChange={e=>setGf(f=>({...f,amount:e.target.value}))}>
                <option value="">Select Amount *</option>
                <option value="50">$50 CAD</option>
                <option value="100">$100 CAD</option>
                <option value="150">$150 CAD</option>
                <option value="200">$200 CAD</option>
                <option value="250">$250 CAD – Full Cleaning Package</option>
              </select>
              <button className="gbtn" onClick={()=>{if(!gf.rEmail||!gf.amount){alert('Please fill in recipient email and select an amount.');return;}setGSent(true);}}>💳 Purchase with Stripe</button>
              <div className="sbadge">🔒 Secured by <strong>Stripe</strong></div>
            </>}
          </div>
        </div>}

        {/* ADMIN */}
        {page===P.admin&&<Admin reviewTick={reviewTick} onReviewsChanged={()=>setReviewTick(t=>t+1)} onExit={exitAdmin}/>}

        {/* CUSTOMER DASHBOARD */}
        {page===P.dashboard&&<div className="dw">
          <h1>My Bookings</h1><div className="pline"/>
          {!dashAuth?<>
            <p style={{color:'var(--gr)',marginBottom:20}}>Enter your email address to view your upcoming bookings.</p>
            <div className="fg"><label>Email Address</label><input type="email" placeholder="you@email.com" value={dashEmail} onChange={e=>setDashEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&dashEmail&&setDashAuth(true)}/></div>
            <button className="rbtn" onClick={()=>dashEmail?setDashAuth(true):null}>View My Bookings</button>
          </>:<>
            <p style={{color:'var(--gr)',marginBottom:20}}>Logged in as <strong>{dashEmail}</strong></p>
            {[{id:'1',service:'Residential – Regular Cleaning',date:'2024-12-28',time:'10:00 AM',address:'123 Main St SW, Calgary',status:'confirmed'},{id:'2',service:'Carpet Cleaning',date:'2025-01-15',time:'2:00 PM',address:'123 Main St SW, Calgary',status:'pending'}].map(b=>(
              <div key={b.id} className="dc">
                <div><h4>{b.service}</h4><p>{b.date} at {b.time}</p><p>{b.address}</p></div>
                <div style={{textAlign:'right'}}>
                  <span className={`badge ${b.status==='confirmed'?'bc':'bp'}`}>{b.status}</span>
                  <div style={{marginTop:10}}>
                    <button className="aa">Reschedule</button>
                    <button className="aa del">Cancel</button>
                  </div>
                </div>
              </div>
            ))}
          </>}
        </div>}

        {/* SEO: CARPET */}
        {page===P.carpet&&<div className="pe">
          <div className="sh">
            <div style={{maxWidth:1100,margin:'0 auto'}}>
              <p className="sbc">Calgary Cleaning Services › Carpet Cleaning</p>
              <h1>Carpet Cleaning Calgary – Professional & Eco-Friendly</h1>
              <p>Calgary's trusted carpet cleaning experts. Hot water extraction, eco-safe products, serving all Calgary neighbourhoods. Same-week booking available.</p>
              <button className="hbtn" style={{marginTop:24}} onClick={()=>nav(P.services)}>Get a Free Quote</button>
            </div>
          </div>
          <div className="sec">
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:48,alignItems:'start'}}>
              <div>
                <div className="gbar" style={{marginBottom:16}}/>
                <h2 className="stitle">Calgary's Best Carpet Cleaning Service</h2>
                <p style={{color:'var(--gm)',lineHeight:1.8,marginBottom:14}}>Re'Store Services provides professional carpet cleaning across Calgary, Airdrie, Cochrane, Chestermere, and Okotoks. Our certified technicians use hot water extraction to remove deep-seated dirt, allergens, pet dander, and stains.</p>
                <p style={{color:'var(--gm)',lineHeight:1.8,marginBottom:14}}>We're locally owned and operated in Calgary. We understand Alberta's unique climate challenges — from muddy spring boots to winter road salt — and tailor our methods accordingly.</p>
                <h3 style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.4rem',color:'var(--red)',margin:'24px 0 10px'}}>Why Choose Re'Store?</h3>
                {['Hot water extraction – #1 carpet manufacturer recommended method','100% eco-friendly, pet-safe, child-safe cleaning products','Fully insured and certified technicians','Same-week appointments available','Free spot treatment included with every clean','Service guarantee – we re-clean if you\'re not satisfied'].map((p,i)=>(
                  <p key={i} style={{color:'var(--gm)',lineHeight:1.7,marginBottom:8,fontSize:14}}>✓ {p}</p>
                ))}
              </div>
              <div>
                <div style={{background:'var(--rlt)',border:'1px solid rgba(204,31,31,.3)',padding:24}}>
                  <h3 style={{fontFamily:'Cormorant Garamond,serif',color:'var(--red)',fontSize:'1.3rem',marginBottom:14}}>Carpet Cleaning Prices</h3>
                  {[['1 Room','From $60'],['2–3 Rooms','From $120'],['Whole Home','$0.18/sq ft'],['Stairs','From $45'],['Area Rug','From $35'],['Pet Odour','+$25/room']].map(([s,pr])=>(
                    <div key={s} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid rgba(204,31,31,.15)',fontSize:14}}>
                      <span>{s}</span><strong style={{color:'var(--red)'}}>{pr}</strong>
                    </div>
                  ))}
                  <button className="rbtn" style={{marginTop:18}} onClick={()=>nav(P.services)}>Book Now</button>
                </div>
              </div>
            </div>
            <div style={{marginTop:48}}>
              <h2 className="stitle">Frequently Asked Questions</h2>
              <div className="gbar" style={{marginBottom:24}}/>
              {FAQS.map((f,i)=>(
                <div key={i} className="fqi">
                  <button className="fqq" onClick={()=>setFaqOpen(faqOpen===i?null:i)}>
                    <span>{f.q}</span><span style={{color:'var(--red)',fontSize:18,fontWeight:400}}>{faqOpen===i?'−':'+'}</span>
                  </button>
                  {faqOpen===i&&<div className="fqa">{f.a}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>}

        {/* SEO: RESIDENTIAL */}
        {page===P.residential&&<div className="pe">
          <div className="sh">
            <div style={{maxWidth:1100,margin:'0 auto'}}>
              <p className="sbc">Calgary Cleaning Services › House Cleaning</p>
              <h1>House Cleaning Calgary – Trusted Residential Cleaners</h1>
              <p>Calgary's top-rated residential cleaning service. Regular, deep clean, move-in/out. Eco-friendly, insured, and background-checked cleaners.</p>
              <button className="hbtn" style={{marginTop:24}} onClick={()=>nav(P.services)}>Book House Cleaning</button>
            </div>
          </div>
          <div className="sec">
            <h2 className="stitle">Professional House Cleaning in Calgary</h2>
            <div className="gbar" style={{marginBottom:24}}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24,marginBottom:36}}>
              {[{s:'Regular Cleaning',p:'From $80',d:'Weekly, bi-weekly or monthly. Keep your home consistently clean and fresh.'},{s:'Deep Cleaning',p:'From $195',d:'Thorough top-to-bottom clean. Perfect for seasonal or first-time cleans.'},{s:'Move-In / Move-Out',p:'From $220',d:"Full clean to get your deposit back or start fresh in your new home."},{s:'Post-Construction',p:'Custom quote',d:'Dust, debris, and residue removal after renovations or builds.'}].map((s,i)=>(
                <div key={i} style={{background:'#fff',border:'1px solid var(--bd)',padding:'22px 26px',boxShadow:'var(--sh)'}}>
                  <h3 style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.3rem',color:'var(--red)',marginBottom:6}}>{s.s}</h3>
                  <p style={{fontSize:'1.05rem',fontWeight:700,color:'var(--gld)',marginBottom:8}}>{s.p}</p>
                  <p style={{fontSize:14,color:'var(--gm)'}}>{s.d}</p>
                </div>
              ))}
            </div>
            <div style={{textAlign:'center'}}><button className="rmbtn" onClick={()=>nav(P.services)}>Book Your House Cleaning</button></div>
          </div>
        </div>}

        {/* SEO: COMMERCIAL */}
        {page===P.commercial&&<div className="pe">
          <div className="sh">
            <div style={{maxWidth:1100,margin:'0 auto'}}>
              <p className="sbc">Calgary Cleaning Services › Commercial Cleaning</p>
              <h1>Commercial Cleaning Calgary – Office &amp; Business Cleaning</h1>
              <p>Professional commercial cleaning for offices, retail, restaurants, and warehouses in Calgary. Fully insured, flexible scheduling, competitive rates.</p>
              <button className="hbtn" style={{marginTop:24}} onClick={()=>nav(P.services)}>Get a Commercial Quote</button>
            </div>
          </div>
          <div className="sec">
            <h2 className="stitle">Calgary Commercial Cleaning Services</h2>
            <div className="gbar" style={{marginBottom:20}}/>
            <p style={{color:'var(--gm)',lineHeight:1.8,marginBottom:16,maxWidth:720}}>Re'Store Services provides flexible commercial cleaning contracts for businesses of all sizes in Calgary. From daily janitorial services to weekly office cleaning and post-event cleanups, our professional team ensures your workplace stays spotless.</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,maxWidth:600,marginBottom:36}}>
              {['Office & corporate buildings','Retail stores & shopping centres','Restaurants & commercial kitchens','Medical & dental offices','Gyms & fitness centres','Warehouses & industrial spaces'].map((s,i)=>(
                <p key={i} style={{fontSize:14,color:'var(--gm)'}}>✓ {s}</p>
              ))}
            </div>
            <div style={{textAlign:'center'}}><button className="rmbtn" onClick={()=>nav(P.services)}>Get a Custom Commercial Quote</button></div>
          </div>
        </div>}

      </main>

      {/* FOOTER */}
      <footer>
        <div className="fg2">
          <div className="fc">
            <h4>Re'Store Services</h4>
            <p>Professional cleaning services for homes and businesses across Calgary and surrounding communities.</p>
            <div style={{marginTop:10,fontSize:13}}>
              <p>📞 <a href="tel:4033833707" style={{color:'inherit'}}>403-383-3707</a></p>
              <p style={{marginTop:4}}>🌐 <a href="https://restoreservices.ca" target="_blank" rel="noopener noreferrer" style={{color:'inherit'}}>restoreservices.ca</a></p>
            </div>
            <div className="soci">
              <a className="soc" href="https://facebook.com" target="_blank" rel="noopener noreferrer">f</a>
              <a className="soc" href="https://twitter.com" target="_blank" rel="noopener noreferrer">𝕏</a>
            </div>
          </div>
          <div className="fc">
            <h4>Areas We Cover</h4>
            <ul>{["Calgary","Airdrie","Cochrane","Chestermere","Okotoks"].map(a=><li key={a}>📍 {a}</li>)}</ul>
            <div style={{marginTop:18}}>
              <h4 style={{borderBottom:'none',padding:0,marginBottom:10,marginTop:0}}>Quick Links</h4>
              <ul>
                {[['Carpet Cleaning Calgary',P.carpet],['House Cleaning Calgary',P.residential],['Commercial Cleaning Calgary',P.commercial],['Quote Calculator',P.quote],['Customer Reviews',P.reviews],['My Bookings',P.dashboard]].map(([l,pg])=>(
                  <li key={pg}><span className="ql" onClick={()=>nav(pg)}>{l}</span></li>
                ))}
              </ul>
            </div>
          </div>
          <div className="fc">
            <h4>Contact Us</h4>
            {cSent?<p style={{color:'#fff',fontWeight:700}}>✅ Thanks! We'll be in touch soon.</p>:
              <div className="cff">
                <input placeholder="Your Name" value={cf.name} onChange={e=>setCf(f=>({...f,name:e.target.value}))}/>
                <input type="email" placeholder="Your Email" value={cf.email} onChange={e=>setCf(f=>({...f,email:e.target.value}))}/>
                <textarea placeholder="Message…" value={cf.msg} onChange={e=>setCf(f=>({...f,msg:e.target.value}))}/>
                <button onClick={()=>setCSent(true)}>Submit</button>
              </div>
            }
          </div>
        </div>
        <div className="fbot">© 2023 by Re'Store Services Inc. &nbsp;|&nbsp; 403-383-3707 &nbsp;|&nbsp; Calgary, AB, Canada</div>
      </footer>

      <Chatbot onNav={nav}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
